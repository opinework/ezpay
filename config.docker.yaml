# ============================================================================
# EzPay Docker 配置文件
# ============================================================================
# 复制此文件为 config.yaml 并根据需要修改
# 管理员账号和Telegram配置在数据库/管理后台中管理
# ============================================================================

# ============================================================================
# 服务器配置
# ============================================================================
server:
  host: "0.0.0.0"          # 监听地址
  port: 6088               # 监听端口

# ============================================================================
# 数据库配置
# ============================================================================
database:
  host: "mysql"            # Docker service name
  port: 3306               # 数据库端口
  user: "ezpay"            # 用户名
  password: "ezpay123456"  # 密码
  dbname: "ezpay"          # 数据库名
  # 连接池配置
  max_open_conns: 100      # 最大打开连接数
  max_idle_conns: 10       # 最大空闲连接数
  conn_max_lifetime: 60    # 连接最大生命周期(分钟)

# ============================================================================
# JWT 认证配置
# ============================================================================
jwt:
  secret: "change-this-to-a-random-string-in-production"  # JWT签名密钥(请修改!)
  expire_hour: 24          # Token过期时间(小时)

# ============================================================================
# 数据存储配置
# ============================================================================
storage:
  data_dir: "/var/lib/ezpay"  # 数据存储目录

# ============================================================================
# 安全配置
# ============================================================================
security:
  # API限流 (基于令牌桶算法)
  rate_limit_api: 20       # API每秒允许请求数
  rate_limit_api_burst: 50 # API突发容量
  rate_limit_login: 2      # 登录接口每秒允许请求数
  rate_limit_login_burst: 5 # 登录突发容量

  # CORS跨域配置
  cors_allow_origins: []

  # IP黑名单缓存时间(秒)
  ip_blacklist_cache_ttl: 30

  # 外部HTTP请求超时(秒)
  http_timeout: 15

# ============================================================================
# 订单配置
# ============================================================================
order:
  expire_minutes: 30       # 订单过期时间(分钟)
  cleanup_hours: 24        # 自动清理多少小时前的无效订单
  wallet_cache_ttl: 30     # 钱包地址缓存时间(秒)
  status_cache_ttl: 5      # 订单状态查询缓存时间(秒)

# ============================================================================
# 回调通知配置
# ============================================================================
notify:
  retry_count: 5           # 通知失败重试次数
  retry_interval: 60       # 重试间隔(秒)
  timeout: 10              # 通知请求超时(秒)

# ============================================================================
# 日志配置
# ============================================================================
log:
  level: "info"            # 日志级别: debug, info, warn, error
  db_log_level: "warn"     # 数据库日志级别
  api_log_days: 30         # API调用日志保留天数

# ============================================================================
# 汇率配置
# ============================================================================
rate:
  auto_update_enabled: true  # 是否启用汇率自动更新
  update_interval: 60        # 自动更新间隔(分钟)
  source: "binance"          # 主数据源: binance, okx, custom
  fallback_source: "okx"     # 备用数据源
  custom_api: ""             # 自定义API地址
  cny_api: "https://api.exchangerate-api.com/v4/latest/USD"  # CNY汇率专用API
  cache_seconds: 300         # 汇率缓存时间(秒)

# ============================================================================
# 区块链监控配置
# ============================================================================
blockchain:
  # TRX (Tron原生代币)
  # scan_interval 会根据是否有待支付订单自动调整（有订单时使用设定值，无订单时自动延长至4倍）
  trx:
    enabled: true
    rpc: "https://api.trongrid.io"
    contract_address: ""   # TRX原生代币无需合约地址
    confirmations: 19      # 确认区块数
    scan_interval: 30      # 基础扫描间隔(秒)

  # TRC20 (Tron USDT)
  trc20:
    enabled: true
    rpc: "https://api.trongrid.io"
    contract_address: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"  # USDT合约
    confirmations: 19
    scan_interval: 30

  # ERC20 (以太坊 USDT)
  erc20:
    enabled: false
    rpc: "https://mainnet.infura.io/v3/YOUR-PROJECT-ID"  # 需替换为你的Infura项目ID
    contract_address: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
    confirmations: 12
    scan_interval: 30
    max_block_range: 1000
    max_batch_size: 3
    batch_delay_ms: 300
    rate_limit: 10.0

  # BEP20 (BSC USDT)
  bep20:
    enabled: true
    rpc: "https://bsc-rpc.publicnode.com"
    rpc_backups:
      - "https://binance.llamarpc.com"
      - "https://bsc-dataseed1.defibit.io"
    contract_address: "0x55d398326f99059fF775485246999027B3197955"
    confirmations: 15
    scan_interval: 30
    max_block_range: 500
    max_batch_size: 1              # 免费节点不支持批量eth_getLogs
    batch_delay_ms: 3000
    rate_limit: 1.0

  # Polygon USDT
  polygon:
    enabled: true
    rpc: "https://polygon-bor-rpc.publicnode.com"
    rpc_backups:
      - "https://polygon-rpc.com"
    contract_address: "0xc2132D05D31c914a87C6611C10748AEb04B58e8F"
    confirmations: 128
    scan_interval: 30
    max_block_range: 10            # Polygon免费节点区块范围限制极严格
    max_batch_size: 1
    batch_delay_ms: 1500
    rate_limit: 1.0

  # Optimism USDT (Layer2)
  optimism:
    enabled: true
    rpc: "https://optimism.publicnode.com"
    rpc_backups:
      - "https://optimism.llamarpc.com"
      - "https://mainnet.optimism.io"
    contract_address: "0x94b008aA00579c1307B0EF2c499aD98a8ce58e58"
    confirmations: 10
    scan_interval: 30
    max_block_range: 2000
    max_batch_size: 5
    batch_delay_ms: 200
    rate_limit: 5.0

  # Arbitrum USDT (Layer2)
  arbitrum:
    enabled: true
    rpc: "https://arb1.arbitrum.io/rpc"
    rpc_backups:
      - "https://arbitrum.publicnode.com"
    contract_address: "0xFd086bC7CD5C481DCC9C85ebE478A1C0b69FCbb9"
    confirmations: 10
    scan_interval: 30
    max_block_range: 2000
    max_batch_size: 5
    batch_delay_ms: 200
    rate_limit: 5.0

  # Avalanche C-Chain USDT
  avalanche:
    enabled: false
    rpc: "https://api.avax.network/ext/bc/C/rpc"
    contract_address: "0x9702230A8Ea53601f5cD2dc00fDBc13d4dF4A8c7"
    confirmations: 12
    scan_interval: 30
    max_block_range: 1000
    max_batch_size: 3
    batch_delay_ms: 300
    rate_limit: 5.0

  # Base USDT (Coinbase Layer2)
  base:
    enabled: true
    rpc: "https://mainnet.base.org"
    rpc_backups:
      - "https://base.publicnode.com"
    contract_address: "0xfde4C96c8593536E31F229EA8f37b2ADa2699bb2"
    confirmations: 10
    scan_interval: 30
    max_block_range: 2000
    max_batch_size: 5
    batch_delay_ms: 200
    rate_limit: 5.0
